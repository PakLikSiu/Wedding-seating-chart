name: Build Seating Chart JSON

on:
  push:
    paths:
      - 'guests.csv' # This ensures the script only runs when you update the CSV

jobs:
  build-and-commit:
    runs-on: ubuntu-latest
    permissions:
      contents: write 
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Run build script
        run: python build.py

      - name: Commit and push JSON
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add guests.json
          git diff --quiet && git diff --staged --quiet || git commit -m "Auto-update guests.json from CSV"
          git push
